name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-13, macos-14, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelog builder

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev pkg-config

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci
      - name: Sync Version from Tag
        shell: bash
        run: |
          # Extract version from tag (strip 'v' prefix)
          TAG="${GITHUB_REF_NAME:-v0.0.0}"
          VERSION="${TAG#v}"
          echo "Syncing version to: $VERSION"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          echo "STRIPPED_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version synced to $VERSION in package.json and tauri.conf.json"

      - name: Setup FFmpeg Sidecar
        run: node scripts/setup-ffmpeg.mjs

      - name: Verify Sidecar (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: ls -la src-tauri/bin/

      - name: Verify Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: ls -la src-tauri/bin/

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vite env vars for About section
          VITE_APP_VERSION: ${{ env.STRIPPED_VERSION }}
          VITE_BUILD_NUMBER: ${{ github.run_number }}
          # macOS Signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Signing
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BitSpark ${{ github.ref_name }}'
          releaseBody: |
            ${{ steps.build_changelog.outputs.changelog }}
            
            ## 📦 Installation
            *   **Windows**: Download `setup.exe` (or `.msi`).
            *   **macOS**: Download `.dmg`.
            *   **Linux**: Download `.deb` (Install with `sudo dpkg -i app.deb`) or `.AppImage`.
          releaseDraft: true
          prerelease: false
